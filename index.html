<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星辰小帐 ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0b0c15; color: #e2e8f0; font-family: sans-serif; }
        [v-cloak] { display: none; }
        .glass { background: rgba(22, 24, 38, 0.8); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-6">
    <div id="app" v-cloak class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- 左侧功能区 -->
        <div class="space-y-6">
            <div class="glass p-6 rounded-3xl flex justify-between items-center">
                <div class="flex gap-4 font-bold text-xl"><span>小星 ✨</span><span>|</span><span>小辰</span></div>
                <div class="text-xs bg-indigo-900/50 px-4 py-2 rounded-full text-indigo-300 border border-indigo-500/30">
                    💡 今日参考汇率: 1 SGD ≈ {{ exchangeRate }} MYR
                </div>
            </div>

            <!-- PK 榜 -->
            <div class="glass p-6 rounded-3xl">
                <h2 class="text-sm text-slate-400 mb-4">🚀 星辰消费 PK 榜</h2>
                <div class="w-full bg-slate-900 rounded-full h-5 flex overflow-hidden mb-4">
                    <div class="bg-indigo-600 transition-all duration-500" :style="{width: stats.xiaoXingPercent + '%'}"></div>
                    <div class="bg-pink-600 transition-all duration-500" :style="{width: stats.xiaoChenPercent + '%'}"></div>
                </div>
                <div class="flex justify-between font-bold">
                    <span>小星: S${{ stats.xiaoXing.toFixed(2) }}</span>
                    <span>小辰: S${{ stats.xiaoChen.toFixed(2) }}</span>
                </div>
            </div>

            <!-- 记账 -->
            <div class="glass p-6 rounded-3xl">
                <h2 class="text-sm text-slate-400 mb-4">✍️ 添加新账单</h2>
                <div class="flex gap-4 mb-6">
                    <button @click="form.payer='小星'" :class="form.payer==='小星'?'bg-indigo-600':'bg-slate-800'" class="flex-1 p-4 rounded-2xl font-bold transition">小星</button>
                    <button @click="form.payer='小辰'" :class="form.payer==='小辰'?'bg-pink-600':'bg-slate-800'" class="flex-1 p-4 rounded-2xl font-bold transition">小辰</button>
                </div>
                <div class="grid grid-cols-5 gap-2 mb-6">
                    <button v-for="c in ['餐饮','购物','交通','娱乐','其他']" @click="form.category=c" :class="form.category===c?'bg-slate-600':'bg-slate-800'" class="p-3 rounded-xl text-xs">{{c}}</button>
                </div>
                <div class="flex gap-2">
                    <select v-model="form.currency" class="bg-slate-900 rounded-2xl px-4"><option>SGD</option><option>MYR</option></select>
                    <input v-model="form.amount" type="number" placeholder="金额" class="flex-1 bg-slate-900 rounded-2xl px-6 py-4 outline-none focus:ring-2 ring-indigo-500">
                    <button @click="save" class="bg-indigo-600 px-8 rounded-2xl font-bold hover:bg-indigo-500">保存</button>
                </div>
            </div>
        </div>

        <!-- 右侧展示区 -->
        <div class="glass p-8 rounded-3xl">
            <h2 class="font-bold mb-6">📊 账单明细列表 (PC版)</h2>
            <div class="space-y-4 max-h-[600px] overflow-y-auto">
                <div v-for="ex in expenses" :key="ex.id" class="flex justify-between items-center p-4 bg-slate-900/50 rounded-2xl hover:bg-slate-800 transition">
                    <div>
                        <div class="font-bold text-sm">{{ ex.payer }} · {{ ex.category }}</div>
                        <div class="text-xs text-slate-500">{{ new Date(ex.created_at).toLocaleDateString() }}</div>
                    </div>
                    <div class="flex items-center gap-6">
                        <span class="font-mono font-bold text-indigo-300">{{ ex.amount }} {{ ex.currency }}</span>
                        <button @click="remove(ex.id)" class="text-red-500 text-xs hover:text-red-400">删除</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('YOUR_SUPABASE_URL_HERE', 'YOUR_SUPABASE_ANON_KEY_HERE');
        Vue.createApp({
            data() { return { expenses: [], exchangeRate: 3.15, form: { payer: '小星', category: '餐饮', currency: 'SGD', amount: '' } } },
            computed: {
                stats() {
                    const xiaoXing = this.expenses.filter(e => e.payer === '小星').reduce((sum, e) => sum + Number(e.amount), 0);
                    const xiaoChen = this.expenses.filter(e => e.payer === '小辰').reduce((sum, e) => sum + Number(e.amount), 0);
                    const total = xiaoXing + xiaoChen || 1;
                    return { xiaoXing, xiaoChen, xiaoXingPercent: (xiaoXing/total)*100, xiaoChenPercent: (xiaoChen/total)*100 };
                }
            },
            methods: {
                async fetchRate() { try { const res = await fetch('https://api.exchangerate-api.com/v4/latest/SGD'); const data = await res.json(); this.exchangeRate = data.rates.MYR.toFixed(2); } catch(e) {} },
                async load() { const { data } = await supabase.from('expenses').select('*').order('created_at', {ascending: false}); this.expenses = data || []; },
                async save() { if(!this.form.amount) return; await supabase.from('expenses').insert({...this.form, ledger_id: "global-ledger-001", created_at: new Date().toISOString()}); this.form.amount = ''; this.load(); },
                async remove(id) { await supabase.from('expenses').delete().eq('id', id); this.load(); }
            },
            mounted() { this.fetchRate(); this.load(); }
        }).mount('#app');
    </script>
</body>
</html>
